<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/Profilepic.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal · NVitschDEV — Notes from the workbench</title>
  <meta name="description" content="NVitschDEV's personal journal — build logs, Linux notes, 3D experiments, and reading." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300;9..144,0,400;9..144,0,500;9..144,1,300;9..144,1,400;9..144,1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ══ CSS Variables — dark (default) ══ */
    :root {
      --bg-0:        #0b0b0f;
      --bg-1:        #111118;
      --bg-2:        #16161f;
      --glass:       rgba(255, 250, 240, 0.025);
      --glass-b:     rgba(255, 250, 240, 0.045);

      --accent:      #e8b16a;
      --accent-2:    #6ea8c7;
      --accent-3:    #d97757;
      --accent-glow: rgba(232, 177, 106, 0.28);

      --text-1:      #f4ede0;
      --text-2:      #9a9489;
      --text-3:      #5a554d;

      --border:      rgba(244, 237, 224, 0.08);
      --border-h:    rgba(232, 177, 106, 0.45);

      --font-display: 'Fraunces', 'Times New Roman', serif;
      --font-body:    'Inter', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'SF Mono', Menlo, monospace;

      --radius:     14px;
      --transition: 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    /* ══ Light Theme — warm paper ══ */
    body.light {
      --bg-0:        #f7f3eb;
      --bg-1:        #f0ebe0;
      --bg-2:        #e8e2d4;
      --glass:       rgba(255, 252, 245, 0.55);
      --glass-b:     rgba(255, 252, 245, 0.85);
      --text-1:      #1a1815;
      --text-2:      #5a554d;
      --text-3:      #9a9489;
      --border:      rgba(26, 24, 21, 0.10);
      --border-h:    rgba(180, 110, 40, 0.45);
      --accent:      #b46e28;
      --accent-2:    #3e6b85;
      --accent-3:    #a04822;
      --accent-glow: rgba(180, 110, 40, 0.25);
    }

    /* ══ Reset & Base ══ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--bg-0);
      color: var(--text-1);
      font-family: var(--font-body);
      font-weight: 400;
      line-height: 1.65;
      overflow-x: hidden;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    /* ══ Subtle background glow ══ */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
              radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232, 177, 106, 0.07), transparent 60%),
              radial-gradient(ellipse 60% 40% at 80% 110%, rgba(110, 168, 199, 0.05), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    body.light::before {
      background-image:
              radial-gradient(ellipse 80% 50% at 50% -10%, rgba(180, 110, 40, 0.06), transparent 60%),
              radial-gradient(ellipse 60% 40% at 80% 110%, rgba(62, 107, 133, 0.04), transparent 60%);
    }

    /* ══ Scrollbar ══ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-0); }
    ::-webkit-scrollbar-thumb { background: var(--bg-2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

    ::selection { background: var(--accent); color: var(--bg-0); }

    a { color: var(--accent); text-decoration: none; transition: color var(--transition); }
    a:hover { color: var(--text-1); }

    .container { max-width: 760px; margin: 0 auto; padding: 0 28px; }

    .hidden { display: none !important; }

    /* ══ Navbar ══ */
    #nav {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 18px 0;
      border-bottom: 1px solid transparent;
      transition: background var(--transition), border-color var(--transition);
      background: transparent;
    }
    #nav.scrolled {
      background: rgba(11, 11, 15, 0.80);
      backdrop-filter: blur(18px) saturate(120%);
      -webkit-backdrop-filter: blur(18px) saturate(120%);
      border-bottom-color: var(--border);
    }
    body.light #nav.scrolled {
      background: rgba(247, 243, 235, 0.88);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 500;
      font-style: italic;
      color: var(--text-1);
      letter-spacing: -0.02em;
      transition: color var(--transition);
    }
    .nav-logo:hover { color: var(--accent); }
    .nav-logo span { color: var(--accent); font-style: normal; }
    .nav-logo-sep {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-3);
    }
    .nav-logo-sub {
      font-family: var(--font-display);
      font-size: 1.0rem;
      font-style: italic;
      color: var(--text-2);
      letter-spacing: -0.01em;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    #nav-back {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-2);
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color var(--transition);
    }
    #nav-back:hover { color: var(--accent); }

    /* Theme toggle button */
    #theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      cursor: pointer;
      color: var(--text-2);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.04em;
      transition: all var(--transition);
    }
    #theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* ══ Page: Index ══ */
    #page-index { position: relative; z-index: 1; }

    .journal-header {
      padding: 72px 0 56px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }
    .journal-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      color: var(--accent);
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .journal-label::before {
      content: '';
      width: 22px;
      height: 1px;
      background: var(--accent);
    }
    .journal-title {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: var(--text-1);
      margin-bottom: 16px;
    }
    .journal-meta {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-3);
      letter-spacing: 0.06em;
    }
    #entry-count { color: var(--text-2); }

    /* ══ Post Grid ══ */
    #posts-grid {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 80px;
    }

    .post-card {
      background: var(--bg-1);
      padding: 32px 36px;
      cursor: pointer;
      transition: background 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .post-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 0% 50%, var(--accent-glow), transparent 60%);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .post-card:hover { background: var(--bg-2); }
    .post-card:hover::before { opacity: 1; }
    body.light .post-card { background: #fbf7ef; }
    body.light .post-card:hover { background: #ffffff; }
    body.light .post-card::before {
      background: radial-gradient(ellipse 60% 80% at 0% 50%, rgba(180, 110, 40, 0.10), transparent 60%);
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .card-index {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.06em;
    }
    .card-sep {
      width: 18px;
      height: 1px;
      background: var(--border-h);
      flex-shrink: 0;
    }
    .card-date {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-3);
      letter-spacing: 0.06em;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 400;
      font-style: italic;
      letter-spacing: -0.02em;
      color: var(--text-1);
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .card-excerpt {
      font-size: 0.9rem;
      color: var(--text-2);
      line-height: 1.65;
      margin-bottom: 18px;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      padding: 3px 9px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--text-3);
      letter-spacing: 0.02em;
      text-transform: lowercase;
    }
    .card-read {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-3);
      white-space: nowrap;
      transition: color var(--transition);
    }
    .post-card:hover .card-read { color: var(--accent); }

    /* ══ Page: Post ══ */
    #page-post { position: relative; z-index: 1; padding-bottom: 80px; }

    #post-header {
      padding: 64px 0 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }
    .post-meta-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-3);
      letter-spacing: 0.06em;
    }
    .post-meta-sep { width: 18px; height: 1px; background: var(--border-h); flex-shrink: 0; }
    .post-title {
      font-family: var(--font-display);
      font-size: clamp(1.9rem, 4.5vw, 3rem);
      font-weight: 400;
      font-style: italic;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text-1);
      margin-bottom: 14px;
    }
    .post-excerpt {
      font-size: 1.05rem;
      color: var(--text-2);
      line-height: 1.7;
      margin-bottom: 20px;
      max-width: 600px;
    }
    .post-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ══ Post Body — Markdown rendered ══ */
    #post-body {
      font-size: 1.02rem;
      line-height: 1.8;
      color: var(--text-2);
    }
    #post-body h1, #post-body h2, #post-body h3, #post-body h4 {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.025em;
      color: var(--text-1);
      margin: 2em 0 0.6em;
      line-height: 1.15;
    }
    #post-body h1 { font-size: 1.9rem; }
    #post-body h2 { font-size: 1.45rem; }
    #post-body h3 { font-size: 1.2rem; }
    #post-body h4 { font-size: 1rem; }
    #post-body p { margin-bottom: 1.4em; }
    #post-body a { color: var(--accent); border-bottom: 1px solid transparent; transition: border-color var(--transition); }
    #post-body a:hover { border-bottom-color: var(--accent); color: var(--accent); }
    #post-body strong { color: var(--text-1); font-weight: 600; }
    #post-body em { color: var(--accent); font-style: italic; font-family: var(--font-display); }
    #post-body code {
      font-family: var(--font-mono);
      font-size: 0.87em;
      background: var(--bg-2);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 5px;
      color: var(--accent);
    }
    body.light #post-body code { background: rgba(26,24,21,0.06); color: var(--accent); }
    #post-body pre {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px 28px;
      overflow-x: auto;
      margin: 1.8em 0;
    }
    body.light #post-body pre { background: rgba(26,24,21,0.05); }
    #post-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.86rem;
      color: var(--text-1);
    }
    #post-body blockquote {
      border-left: 2px solid var(--accent);
      padding: 4px 0 4px 24px;
      margin: 1.8em 0;
      color: var(--text-2);
      font-style: italic;
    }
    #post-body ul, #post-body ol {
      padding-left: 24px;
      margin-bottom: 1.4em;
    }
    #post-body li { margin-bottom: 0.4em; }
    #post-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.4em 0;
    }

    /* ══ Pagination ══ */
    #post-pagination {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      margin-top: 64px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }
    .pagination-next { text-align: right; }
    .pagination-link { transition: opacity var(--transition); }
    .pagination-link:hover { opacity: 0.7; }
    .pagination-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-3);
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .pagination-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1rem;
      color: var(--text-1);
      line-height: 1.3;
    }

    /* ══ 404 ══ */
    #page-404 {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 0;
      z-index: 1;
      position: relative;
    }
    .err-code {
      font-family: var(--font-display);
      font-size: 6rem;
      font-style: italic;
      font-weight: 300;
      color: var(--border-h);
      line-height: 1;
      margin-bottom: 16px;
    }
    .err-msg {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-3);
      margin-bottom: 28px;
      letter-spacing: 0.06em;
    }

    /* ══ Footer ══ */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      z-index: 1;
      position: relative;
    }
    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    footer p {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-3);
      letter-spacing: 0.02em;
    }
    #footer-year { color: var(--text-3); }
    .footer-back-top {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-3);
      cursor: pointer;
      background: none;
      border: none;
      transition: color var(--transition);
      letter-spacing: 0.04em;
    }
    .footer-back-top:hover { color: var(--accent); }

    /* ══ Animations ══ */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }
    }
    .anim-fade-up {
      animation: fade-up 0.6s cubic-bezier(0.22, 0.61, 0.36, 1) both;
    }

    /* ══ Responsive ══ */
    @media (max-width: 600px) {
      .post-card { padding: 24px 20px; }
      #post-header { padding: 48px 0 32px; }
      .journal-header { padding: 56px 0 40px; }
      .nav-logo-sep, .nav-logo-sub { display: none; }
    }
  </style>
</head>
<body>

<!-- ══ NAVBAR ══ -->
<nav id="nav" role="navigation" aria-label="Journal navigation">
  <div class="container nav-inner">
    <div class="nav-left">
      <a href="https://nvitschdev.github.io" class="nav-logo">NVitsch<span>DEV</span></a>
      <span class="nav-logo-sep">/</span>
      <span class="nav-logo-sub">Journal</span>
    </div>
    <div class="nav-right">
      <a href="#" id="nav-back" class="hidden" onclick="showIndex(); return false;">
        ← All entries
      </a>
      <button id="theme-toggle" aria-label="Toggle light/dark theme">☀ Light</button>
    </div>
  </div>
</nav>

<!-- ══ PAGE: INDEX ══ -->
<div id="page-index">
  <div class="container">
    <header class="journal-header">
      <div class="journal-label">// notes from the workbench</div>
      <h1 class="journal-title">Journal</h1>
      <p class="journal-meta">
        <span id="entry-count">— entries</span>
        &nbsp;·&nbsp; NVitschDEV &nbsp;·&nbsp; build logs · linux · 3D · reading
      </p>
    </header>

    <main id="posts-grid" role="list" aria-label="Journal entries"></main>
  </div>
</div>

<!-- ══ PAGE: POST ══ -->
<div id="page-post" class="hidden">
  <div class="container">
    <header id="post-header"></header>
    <article id="post-body"></article>
    <nav id="post-pagination" aria-label="Post navigation"></nav>
  </div>
</div>

<!-- ══ PAGE: 404 ══ -->
<div id="page-404" class="hidden">
  <div class="container">
    <div class="err-code">404</div>
    <p class="err-msg">// entry not found</p>
    <a href="#" onclick="showIndex(); return false;" style="font-family:var(--font-mono);font-size:0.78rem;color:var(--accent);">← Back to journal</a>
  </div>
</div>

<!-- ══ FOOTER ══ -->
<footer>
  <div class="container footer-inner">
    <p id="footer-year"></p>
    <button class="footer-back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ top</button>
  </div>
</footer>

<script>
  /* ── Theme toggle ──────────────────────────────────────────────────── */
  const themeBtn = document.getElementById('theme-toggle');
  let isLight = localStorage.getItem('journal-theme') === 'light';

  function applyTheme() {
    document.body.classList.toggle('light', isLight);
    themeBtn.textContent = isLight ? '🌑 Dark' : '☀ Light';
  }
  applyTheme();

  themeBtn.addEventListener('click', () => {
    isLight = !isLight;
    localStorage.setItem('journal-theme', isLight ? 'light' : 'dark');
    applyTheme();
  });

  /* ── Navbar scroll ─────────────────────────────────────────────────── */
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 30);
  }, { passive: true });

  /* ══════════════════════════════════════════════════════════════════════
     Blog posts — edit this array to add or update entries.
  ══════════════════════════════════════════════════════════════════════ */
  const posts = [
    {
      slug: "first-entry-hello-world",
      title: "Hello, world! (Again...)",
      excerpt: "Starting a journal. Less manifesto, more sketchbook — what I'm building, breaking, and reading this week.",
      date: "2026-04-26",
      readingMinutes: 1,
      tags: ["Hi", "writing"],
      content: "Every developer eventually starts a blog. Then deletes it. Then starts another one. This is mine — Notes from the workbench. — and I'm trying something different: no audience, no SEO, no engagement metrics. Just notes from the workbench.\n\n## Why bother\n\nI forget things. A lot. Every time I solve a tricky shell problem or finally tame a Godot quirk, I tell myself I'll remember. I never do. So this is partly a second brain, partly an excuse to write more carefully than my git commit messages allow.\n\n## What you'll find here\n\n- **Build logs** — what I'm working on, what's stuck\n- **Linux notes** — Arch tips, dotfile experiments, terminal tooling\n- **3D & video** — Blender scenes, Resolve workflows, render disasters\n- **Reading** — books, papers, weird corners of the internet\n- **My life** — Stories worthy of sharing\n\n> The best software is the one that a developer created with passion.\n\nThat's the bar. See you in the next entry."
    },
  ];

  // Helpers
  function getSortedPosts() {
    return [...posts].sort((a, b) => (a.date < b.date ? 1 : -1));
  }
  function getPostBySlug(slug) {
    return posts.find((p) => p.slug === slug);
  }
  function formatDate(iso) {
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
  }

  // Markdown renderer
  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function inline(s) {
    let out = escapeHtml(s);
    out = out.replace(/`([^`]+)`/g, function(_, c) { return "<code>" + c + "</code>"; });
    out = out.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    out = out.replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>");
    out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_, t, u) {
      return '<a href="' + u + '" target="_blank" rel="noopener noreferrer">' + t + "</a>";
    });
    return out;
  }
  function renderMarkdown(md) {
    const lines = md.split("\n");
    const html = [];
    let i = 0;
    let inList = null;
    const closeList = function() {
      if (inList) { html.push("</" + inList + ">"); inList = null; }
    };
    while (i < lines.length) {
      const line = lines[i];
      if (line.startsWith("```")) {
        closeList();
        const lang = line.slice(3).trim();
        const buf = [];
        i++;
        while (i < lines.length && !lines[i].startsWith("```")) { buf.push(lines[i]); i++; }
        i++;
        html.push("<pre><code" + (lang ? ' class="lang-' + lang + '"' : "") + ">" + escapeHtml(buf.join("\n")) + "</code></pre>");
        continue;
      }
      const hMatch = /^(#{1,4})\s+(.*)$/.exec(line);
      if (hMatch) {
        closeList();
        const level = hMatch[1].length;
        html.push("<h" + level + ">" + inline(hMatch[2]) + "</h" + level + ">");
        i++; continue;
      }
      if (/^---+$/.test(line.trim())) {
        closeList(); html.push("<hr/>"); i++; continue;
      }
      if (line.startsWith("> ")) {
        closeList();
        const buf = [];
        while (i < lines.length && lines[i].startsWith("> ")) { buf.push(lines[i].slice(2)); i++; }
        html.push("<blockquote>" + inline(buf.join(" ")) + "</blockquote>");
        continue;
      }
      if (/^[-*]\s+/.test(line)) {
        if (inList !== "ul") { closeList(); html.push("<ul>"); inList = "ul"; }
        html.push("<li>" + inline(line.replace(/^[-*]\s+/, "")) + "</li>");
        i++; continue;
      }
      if (/^\d+\.\s+/.test(line)) {
        if (inList !== "ol") { closeList(); html.push("<ol>"); inList = "ol"; }
        html.push("<li>" + inline(line.replace(/^\d+\.\s+/, "")) + "</li>");
        i++; continue;
      }
      if (line.trim() === "") { closeList(); i++; continue; }
      closeList();
      const buf = [line]; i++;
      while (i < lines.length && lines[i].trim() !== "" && !/^(#{1,4}\s|>\s|[-*]\s|\d+\.\s|```|---+$)/.test(lines[i])) {
        buf.push(lines[i]); i++;
      }
      html.push("<p>" + inline(buf.join(" ")) + "</p>");
    }
    closeList();
    return html.join("\n");
  }

  // Routing
  function showIndex() {
    document.getElementById("page-index").classList.remove("hidden");
    document.getElementById("page-post").classList.add("hidden");
    document.getElementById("page-404").classList.add("hidden");
    document.getElementById("nav-back").classList.add("hidden");
    document.title = "Journal \u00b7 NVitschDEV \u2014 Notes from the workbench";
    try { history.pushState(null, "", "/"); } catch(e) {}
    renderIndex();
  }
  function showPost(slug) {
    const post = getPostBySlug(slug);
    if (!post) { show404(); return; }
    document.getElementById("page-index").classList.add("hidden");
    document.getElementById("page-post").classList.remove("hidden");
    document.getElementById("page-404").classList.add("hidden");
    document.getElementById("nav-back").classList.remove("hidden");
    document.title = post.title + " \u00b7 NVitschDEV Journal";
    try { history.pushState(null, "", "/post/" + slug); } catch(e) {}
    window.scrollTo({ top: 0, behavior: "instant" });
    renderPost(post);
  }
  function show404() {
    document.getElementById("page-index").classList.add("hidden");
    document.getElementById("page-post").classList.add("hidden");
    document.getElementById("page-404").classList.remove("hidden");
    document.getElementById("nav-back").classList.add("hidden");
  }

  // Renderers
  function renderIndex() {
    const sorted = getSortedPosts();
    document.getElementById("entry-count").textContent = sorted.length + " entries";
    document.getElementById("footer-year").textContent = "\u00a9 " + new Date().getFullYear() + " NVitschDEV";
    const grid = document.getElementById("posts-grid");
    grid.innerHTML = sorted.map(function(p, i) {
      return '<div class="post-card anim-fade-up" role="listitem" style="animation-delay:' + (i * 80) + 'ms" onclick="showPost(\'' + p.slug + '\')">'
              + '<div class="card-meta">'
              + '<span class="card-index">' + String(i + 1).padStart(2, "0") + '</span>'
              + '<span class="card-sep"></span>'
              + '<time class="card-date">' + formatDate(p.date) + '</time>'
              + '</div>'
              + '<h2 class="card-title">' + escapeHtml(p.title) + '</h2>'
              + '<p class="card-excerpt">' + escapeHtml(p.excerpt) + '</p>'
              + '<div class="card-footer">'
              + '<div class="card-tags">' + p.tags.map(function(t) { return '<span class="tag">' + escapeHtml(t) + '</span>'; }).join("") + '</div>'
              + '<span class="card-read">' + p.readingMinutes + ' min read \u2192</span>'
              + '</div></div>';
    }).join("");
  }
  function renderPost(post) {
    const all = getSortedPosts();
    const idx = all.findIndex(function(p) { return p.slug === post.slug; });
    const prev = all[idx + 1];
    const next = all[idx - 1];
    document.getElementById("post-header").innerHTML =
            '<div class="post-meta-row"><time>' + formatDate(post.date) + '</time><span class="post-meta-sep"></span><span>' + post.readingMinutes + ' min read</span></div>'
            + '<h1 class="post-title">' + escapeHtml(post.title) + '</h1>'
            + '<p class="post-excerpt">' + escapeHtml(post.excerpt) + '</p>'
            + '<div class="post-tags">' + post.tags.map(function(t) { return '<span class="tag">' + escapeHtml(t) + '</span>'; }).join("") + '</div>';
    document.getElementById("post-body").innerHTML = renderMarkdown(post.content);
    document.getElementById("post-pagination").innerHTML =
            '<div>' + (prev ? '<div class="pagination-link" onclick="showPost(\'' + prev.slug + '\')" style="cursor:pointer"><p class="pagination-label">\u2190 previous</p><p class="pagination-title">' + escapeHtml(prev.title) + '</p></div>' : '<span></span>') + '</div>'
            + '<div class="pagination-next">' + (next ? '<div class="pagination-link" onclick="showPost(\'' + next.slug + '\')" style="cursor:pointer"><p class="pagination-label">next \u2192</p><p class="pagination-title">' + escapeHtml(next.title) + '</p></div>' : '<span></span>') + '</div>';
  }

  // Init
  window.addEventListener("popstate", function() {
    const match = location.pathname.match(/^\/post\/(.+)$/);
    if (match) showPost(match[1]); else showIndex();
  });
  (function() {
    const match = location.pathname.match(/^\/post\/(.+)$/);
    if (match) showPost(match[1]); else showIndex();
  })();
</script>
